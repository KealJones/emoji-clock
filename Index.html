<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 36px 20px; overflow-y: auto;
  }
  .label {
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; color: #555;
  }
  #time-display {
    font-size: 28px; font-weight: 300; letter-spacing: 2px;
    color: #fff; margin: 8px 0 16px;
    font-variant-numeric: tabular-nums;
  }
  .ctrl-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; flex-wrap: wrap; justify-content: center;
  }
  .ctrl-row:last-of-type { margin-bottom: 28px; }
  .ctrl-row button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #999; font-family: inherit; font-size: 11px;
    letter-spacing: 1px; padding: 6px 12px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-row button:hover { background: rgba(255,255,255,0.1); color: #ccc; }
  .ctrl-row button.active {
    background: rgba(120,140,255,0.15);
    border-color: rgba(120,140,255,0.4); color: #a0b0ff;
  }
  .emoji-stage {
    position: relative; width: 170px; height: 170px; margin-bottom: 10px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .glow-ring {
    position: absolute; inset: 8px; border-radius: 50%;
    border: 1px solid rgba(120,140,255,0.15);
    box-shadow: 0 0 40px rgba(120,140,255,0.08);
  }
  .emoji-layer {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 20px rgba(120,140,255,0.3));
    transition: opacity 0.25s ease;
  }
  .emoji-layer img { width: 140px; height: 140px; image-rendering: auto; }
  .emoji-layer.hidden { opacity: 0; }
  .center-dot {
    position: absolute; top: 50%; left: 50%;
    width: 5px; height: 5px;
    margin-left: -2.5px; margin-top: -2.5px;
    background: #ff3b3b; border-radius: 50%;
    box-shadow: 0 0 3px rgba(255,59,59,0.5);
    pointer-events: none; z-index: 10;
    opacity: 0; transition: opacity 0.2s;
  }
  .center-dot.visible { opacity: 1; }
  #emoji-label {
    font-size: 12px; color: #777; margin-bottom: 20px;
    text-align: center; line-height: 1.5;
  }
  .runners { display: flex; gap: 28px; margin-bottom: 28px; align-items: flex-end; }
  .runner { display: flex; flex-direction: column; align-items: center; opacity: 0.45; }
  .runner .r-emoji { font-size: 44px; line-height: 1; }
  .runner .r-info {
    font-size: 9px; color: #555; margin-top: 4px;
    letter-spacing: 1px; font-variant-numeric: tabular-nums;
    text-align: center; line-height: 1.4;
  }
  .runner .r-rank {
    font-size: 9px; color: #444; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .stats {
    display: flex; gap: 24px; margin-bottom: 32px;
    flex-wrap: wrap; justify-content: center;
  }
  .stat-val {
    font-size: 17px; font-weight: 400; color: #ddd;
    font-variant-numeric: tabular-nums; text-align: center;
  }
  .stat-val.accent { color: #a0b0ff; }
  .stat-label {
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: #555;
    margin-top: 3px; text-align: center;
  }
  .needle-row {
    max-width: 420px; width: 100%; height: 18px;
    position: relative; margin-bottom: 4px;
  }
  #needle {
    position: absolute; top: 0; width: 2px; height: 14px;
    background: #a0b0ff; border-radius: 1px;
    box-shadow: 0 0 6px rgba(120,140,255,0.5);
  }
  #needle::after {
    content: ''; position: absolute; bottom: -3px; left: -2.5px;
    width: 7px; height: 7px; background: #a0b0ff; border-radius: 50%;
  }
  .grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 5px; max-width: 420px; width: 100%;
  }
  .grid-cell {
    display: flex; flex-direction: column; align-items: center;
    padding: 7px 2px; border-radius: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent; transition: all 0.3s ease;
  }
  .grid-cell.best {
    background: rgba(120,140,255,0.14);
    border-color: rgba(120,140,255,0.45);
  }
  .grid-cell.runner-up {
    background: rgba(120,140,255,0.06);
    border-color: rgba(120,140,255,0.18);
  }
  .grid-cell span:first-child { font-size: 22px; margin-bottom: 2px; }
  .grid-cell .angle {
    font-size: 9px; color: #444; font-variant-numeric: tabular-nums;
  }
  .grid-cell.best .angle { color: #a0b0ff; }
  .grid-cell.runner-up .angle { color: #7080bb; }
  .footer {
    margin-top: 24px; font-size: 11px; color: #333;
    text-align: center; max-width: 380px; line-height: 1.6;
  }
</style>
</head>
<body>

<div class="label">current time</div>
<div id="time-display">--:--:--</div>

<div class="ctrl-row">
  <span class="label" style="letter-spacing:1px">speed</span>
  <button data-speed="1" class="active">1&times;</button>
  <button data-speed="10">10&times;</button>
  <button data-speed="60">60&times;</button>
  <button data-speed="360">360&times;</button>
  <button data-speed="3600">3600&times;</button>
</div>

<div class="emoji-stage">
  <div class="glow-ring"></div>
  <div class="emoji-layer" id="emoji-a"><img></div>
  <div class="emoji-layer hidden" id="emoji-b"><img></div>
  <div class="center-dot"></div>
</div>
<div id="emoji-label"></div>

<div class="runners">
  <div class="runner" id="runner-2">
    <div class="r-rank">2nd</div>
    <div class="r-emoji"></div>
    <div class="r-info"></div>
  </div>
  <div class="runner" id="runner-3">
    <div class="r-rank">3rd</div>
    <div class="r-emoji"></div>
    <div class="r-info"></div>
  </div>
</div>

<div class="stats">
  <div><div class="stat-val" id="s-hour">&mdash;</div><div class="stat-label">hour hand</div></div>
  <div><div class="stat-val" id="s-min">&mdash;</div><div class="stat-label">minute hand</div></div>
  <div><div class="stat-val" id="s-between">&mdash;</div><div class="stat-label">between</div></div>
  <div><div class="stat-val accent" id="s-error">&mdash;</div><div class="stat-label">error</div></div>
</div>

<div class="label" style="margin-bottom:8px">sorted by angle between hands &middot; 0&deg; &rarr; 360&deg;</div>
<div class="needle-row"><div id="needle"></div></div>
<div class="grid" id="emoji-grid"></div>

<div class="footer">
  Pre-renders each emoji to a bitmap, measures the clock-face center, and rotates around that exact point with crossfade transitions.
</div>

<script>
const CLOCKS = [
  ["\u{1F55B}",12,0],["\u{1F567}",12,30],
  ["\u{1F550}",1,0], ["\u{1F55C}",1,30],
  ["\u{1F551}",2,0], ["\u{1F55D}",2,30],
  ["\u{1F552}",3,0], ["\u{1F55E}",3,30],
  ["\u{1F553}",4,0], ["\u{1F55F}",4,30],
  ["\u{1F554}",5,0], ["\u{1F560}",5,30],
  ["\u{1F555}",6,0], ["\u{1F561}",6,30],
  ["\u{1F556}",7,0], ["\u{1F562}",7,30],
  ["\u{1F557}",8,0], ["\u{1F563}",8,30],
  ["\u{1F558}",9,0], ["\u{1F564}",9,30],
  ["\u{1F559}",10,0],["\u{1F565}",10,30],
  ["\u{1F55A}",11,0],["\u{1F566}",11,30],
];

const hourA = (h,m) => ((h%12)*30 + m*0.5) % 360;
const minA  = (m) => (m*6) % 360;
const btwn = (h,m) => ((minA(m) - hourA(h,m)) % 360 + 360) % 360;
const angDist = (a,b) => { const d=((a-b)%360+360)%360; return Math.min(d,360-d); };
const fmt = (d) => d.toFixed(1)+"\u00B0";
const fmtTime = (h,m) => h+":"+(m===0?"00":"30");

// ── Pre-render system emojis to bitmaps ──
const emojiData = {};

function prerenderEmojis() {
  const size = 400;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  for (const [emoji] of CLOCKS) {
    ctx.clearRect(0, 0, size, size);
    ctx.font = (size*0.85)+'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, size/2, size/2);

    const data = ctx.getImageData(0, 0, size, size).data;
    let minX=size, maxX=0, minY=size, maxY=0;
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (data[(y*size+x)*4+3] > 30) {
          if (x<minX) minX=x; if (x>maxX) maxX=x;
          if (y<minY) minY=y; if (y>maxY) maxY=y;
        }
      }
    }
    const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
    const margin = 4;
    const tl = Math.max(0, minX-margin), tt = Math.max(0, minY-margin);
    const tw = Math.min(size, maxX+margin+1)-tl;
    const th = Math.min(size, maxY+margin+1)-tt;
    const trimmed = document.createElement('canvas');
    trimmed.width = tw; trimmed.height = th;
    trimmed.getContext('2d').drawImage(canvas, tl, tt, tw, th, 0, 0, tw, th);
    emojiData[emoji] = {
      dataUrl: trimmed.toDataURL('image/png'),
      originX: ((cx-tl)/tw)*100,
      originY: ((cy-tt)/th)*100
    };
  }
}

prerenderEmojis();

// ── Sort & grid ──
const sorted = CLOCKS.map(([emoji,h,m]) => ({
  emoji, h, m, ab: btwn(h,m)
})).sort((a,b) => a.ab - b.ab);

const grid = document.getElementById("emoji-grid");
const cells = sorted.map((item, si) => {
  const cell = document.createElement("div");
  cell.className = "grid-cell";
  cell.innerHTML = '<span>'+item.emoji+'</span><span class="angle">'+fmt(item.ab)+'</span>';
  grid.appendChild(cell);
  return { el: cell, si, ...item };
});

// ── Speed control ──
let speed = 1, simOffset = 0, speedAnchor = Date.now();
const realStart = Date.now();

document.querySelectorAll(".ctrl-row button[data-speed]").forEach(b => {
  b.addEventListener("click", () => {
    const now = Date.now();
    simOffset += (now - speedAnchor) * speed;
    speedAnchor = now;
    speed = +b.dataset.speed;
    document.querySelectorAll(".ctrl-row button[data-speed]").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  });
});

function getSimTime() {
  const now = Date.now();
  return new Date(realStart + simOffset + (now - speedAnchor) * speed);
}

// ── Center dot toggle ──
document.querySelector('.emoji-stage').addEventListener('click', () => {
  document.querySelector('.center-dot').classList.toggle('visible');
});

// ── Crossfade state ──
const layerA = document.getElementById("emoji-a");
const layerB = document.getElementById("emoji-b");
const imgA = layerA.querySelector("img");
const imgB = layerB.querySelector("img");
let activeFrontLayer = layerA, activeBackLayer = layerB;
let activeFrontImg = imgA, activeBackImg = imgB;
let currentEmoji = null;

function setLayerEmoji(img, emoji, angleDeg) {
  const d = emojiData[emoji];
  if (!d) return;
  if (img.dataset.ek !== emoji) {
    img.src = d.dataUrl;
    img.dataset.ek = emoji;
  }
  img.style.transformOrigin = d.originX.toFixed(2)+'% '+d.originY.toFixed(2)+'%';
  const tx = (50 - d.originX).toFixed(2);
  const ty = (50 - d.originY).toFixed(2);
  img.style.transform = 'translate('+tx+'%, '+ty+'%) rotate('+angleDeg.toFixed(2)+'deg)';
}

function tick() {
  const now = getSimTime();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const tm = m + s/60;
  const realAB = btwn(h, tm);
  const realHA = hourA(h, tm);
  const realMA = minA(tm);

  document.getElementById("time-display").textContent =
    now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});

  const ranked = cells.map(c => ({
    ...c, dist: angDist(realAB, c.ab)
  })).sort((a,b) => a.dist - b.dist);

  const best = ranked[0];
  const r2 = ranked.filter(r => r.emoji !== best.emoji)[0];
  const r3 = ranked.filter(r => r.emoji !== best.emoji)[1];
  const rot = (d) => ((realHA - hourA(d.h, d.m)) % 360 + 360) % 360;
  const bestRot = rot(best);
  const emojiChanged = (best.emoji !== currentEmoji);

  const fadeDur = Math.max(0.05, 0.25 / Math.sqrt(speed));
  const rotDur = Math.max(0.02, 0.3 / speed);

  if (emojiChanged) {
    activeBackImg.style.transition = 'none';
    setLayerEmoji(activeBackImg, best.emoji, bestRot);
    activeBackLayer.offsetHeight;
    activeBackLayer.style.transition = 'opacity '+fadeDur+'s ease';
    activeFrontLayer.style.transition = 'opacity '+fadeDur+'s ease';
    activeBackLayer.classList.remove('hidden');
    activeFrontLayer.classList.add('hidden');
    const tmpL = activeFrontLayer, tmpI = activeFrontImg;
    activeFrontLayer = activeBackLayer;
    activeFrontImg = activeBackImg;
    activeBackLayer = tmpL;
    activeBackImg = tmpI;
    currentEmoji = best.emoji;
  } else {
    activeFrontImg.style.transition = 'transform '+rotDur+'s cubic-bezier(0.34,1.4,0.64,1)';
    setLayerEmoji(activeFrontImg, best.emoji, bestRot);
  }

  document.getElementById("emoji-label").innerHTML =
    best.emoji+' '+fmtTime(best.h,best.m)+' &middot; rotated '+fmt(bestRot)+' &middot; err '+fmt(best.dist);

  const setRunner = (id, r) => {
    const el = document.getElementById(id);
    el.querySelector(".r-emoji").textContent = r.emoji;
    el.querySelector(".r-emoji").style.transform = 'rotate('+rot(r)+'deg)';
    el.querySelector(".r-info").textContent = fmtTime(r.h,r.m)+' \u00B7 err '+fmt(r.dist);
  };
  setRunner("runner-2", r2);
  setRunner("runner-3", r3);

  document.getElementById("s-hour").textContent = fmt(realHA);
  document.getElementById("s-min").textContent = fmt(realMA);
  document.getElementById("s-between").textContent = fmt(realAB);
  document.getElementById("s-error").textContent = fmt(best.dist);

  cells.forEach(c => c.el.classList.remove("best","runner-up"));
  cells[best.si].el.classList.add("best");
  cells[r2.si].el.classList.add("runner-up");
  cells[r3.si].el.classList.add("runner-up");

  document.getElementById("needle").style.left = 'calc('+(realAB/360*100)+'% - 1px)';
}

tick();
setInterval(tick, 50);
</script>
</body>
</html>
